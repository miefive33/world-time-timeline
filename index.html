<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Timeline Clock</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./mobile.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-card">
      <div>
        <h1>World Timeline Clock</h1>
        <p class="subtitle">
          世界の時差を「線」で読む。時差の地獄を少し減らすためのタイムライン時計。
        </p>
      </div>

      <div class="toolbar">
        <button id="addCityBtn" class="primary-btn">+ Add City</button>
        <button id="nowBtn" class="secondary-btn">Now</button>
      </div>
    </header>

    <main class="board-card">
      <div class="board-header">
        <div class="header-city">Cities</div>
        <div class="header-digital">Digital</div>
        <div class="header-timeline">
          <div class="timeline-header-inner">
            <div id="timelineHours" class="timeline-hours"></div>
          </div>
        </div>
      </div>

      <div id="rowsContainer" class="rows-container"></div>
    </main>
  </div>

  <div id="trashBin" class="trash-bin" title="ここにドロップで削除">
    <div class="trash-icon">🗑</div>
    <div class="trash-label">Drop to delete</div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
